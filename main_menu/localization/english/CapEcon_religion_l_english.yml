l_english:
# Maintainer Note:
# - Purpose: CapEcon_religion_l_english.yml defines English localization keys used by the Pantalone_Economics feature set.
# - Reasoning: keeping this logic in a dedicated file isolates balancing and avoids accidental vanilla overlap.
# - Maintenance: keep localization keys in sync with scripted ids and GUI references to prevent missing-text fallbacks.
#
 denaro_god: "Denaro"
 denaro_god_desc: "Denaro blesses the coffers of the faithful, turning faith into steady revenue."
 worship_denaro_god: "$worship_title1$ the $denaro_god$ $worship_title2$"
 worship_denaro_god_desc: "$worship_desc1$ the [ShowGodName('denaro_god')] $worship_desc2$"

 produttivita_god: "Produttività"
 produttivita_god_desc: "Produttività rewards industry and discipline, raising the output of every workshop."
 worship_produttivita_god: "$worship_title1$ the $produttivita_god$ $worship_title2$"
 worship_produttivita_god_desc: "$worship_desc1$ the [ShowGodName('produttivita_god')] $worship_desc2$"
