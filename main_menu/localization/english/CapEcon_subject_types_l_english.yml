l_english:
# Maintainer Note:
# - Purpose: CapEcon_subject_types_l_english.yml defines English localization keys used by the Pantalone_Economics feature set.
# - Reasoning: keeping this logic in a dedicated file isolates balancing and avoids accidental vanilla overlap.
# - Maintenance: keep localization keys in sync with scripted ids and GUI references to prevent missing-text fallbacks.
#
 international_company: "International Company"
 international_company_desc: "An $international_company$ is a chartered mercantile [subject|e] created to expand foreign trade and investment. It operates as a [ShowGovernmentTypeName('company')], pays heavy dividends to its [overlord|e], and maintains limited diplomacy."
 LEAD_international_company: "$LIST$ is a [SUBJECT_TYPE.GetName]"
 AM_international_company: "[SUBJECT_TYPE.GetName] of $LIST$."
